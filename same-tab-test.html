<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Same Tab Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #191919;
      color: white;
      font-family: Arial, sans-serif;
    }

    button {
      width: 100%;
      padding: 30px;
      border: 0;
      background: #333;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="testBtn">Click me — same tab Google</button>

  <script>
    document.getElementById("testBtn").addEventListener("click", () => {
      window.top.location.href = "https://www.google.com";
    });
  </script>
</body>
</html>
